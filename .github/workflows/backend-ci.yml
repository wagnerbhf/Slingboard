name: Backend CI

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - '**.cs'
      - '**.csproj'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependências
        run: dotnet restore Slingboard.slnx

      - name: Build
        run: dotnet build Slingboard.slnx --configuration Release --no-restore

      - name: Testes de Domain
        run: dotnet test Slingboard.Domain.Tests/Slingboard.Domain.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=domain-tests.trx"

      - name: Testes de Application
        run: dotnet test Slingboard.Application.Tests/Slingboard.Application.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=application-tests.trx"

      - name: Testes de Integração
        run: dotnet test Slingboard.IntegrationTests/Slingboard.IntegrationTests.csproj --configuration Release --no-build --logger "trx;LogFileName=integration-tests.trx"

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados dos Testes
          path: '**/*.trx'
          reporter: dotnet-trx